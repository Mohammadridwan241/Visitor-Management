<div class="card">
    <div class="table-responsive">
        <table class="table table-hover mb-0">
            <thead><tr><th>Reference</th><th>Visitor</th><th>Phone</th><th>Host</th><th>Date</th><th>Status</th></tr></thead>
            <tbody>
            {% for visit in visits %}
                <tr>
                    <td>{{ visit.reference_no }}</td>
                    <td>{{ visit.visitor_name }}</td>
                    <td>{{ visit.visitor_phone }}</td>
                    <td>{{ visit.host_name }}</td>
                    <td>{{ visit.visit_date }}</td>
                    <td>{% include "reception/_status_badge.html" %}</td>
                </tr>
            {% empty %}
                <tr><td colspan="6" class="text-center text-muted py-4">No visits found.</td></tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</div>
