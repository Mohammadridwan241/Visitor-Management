<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Visitor Management System{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --ink: #162033;
            --muted: #667085;
            --brand: #2563eb;
            --brand-dark: #1d4ed8;
            --teal: #0f9f8f;
            --coral: #f9735b;
            --amber: #f5a524;
            --surface: rgba(255, 255, 255, 0.92);
            --line: rgba(37, 99, 235, 0.12);
        }

        body {
            min-height: 100vh;
            color: var(--ink);
            background:
                radial-gradient(circle at 12% 16%, rgba(15, 159, 143, 0.18), transparent 26%),
                radial-gradient(circle at 88% 12%, rgba(249, 115, 91, 0.16), transparent 24%),
                linear-gradient(135deg, #f7fbff 0%, #eef7f3 46%, #fff7ed 100%);
        }

        .app-shell {
            min-height: calc(100vh - 78px);
        }

        .navbar {
            background: linear-gradient(90deg, #ffffff 0%, #f4fbff 46%, #fff8f3 100%);
            box-shadow: 0 12px 30px rgba(31, 41, 55, 0.08);
        }

        .navbar-brand {
            color: var(--brand-dark);
            letter-spacing: 0;
        }

        .brand-mark {
            display: inline-grid;
            width: 34px;
            height: 34px;
            margin-right: 10px;
            place-items: center;
            border-radius: 8px;
            color: #fff;
            background: linear-gradient(135deg, var(--brand), var(--teal));
            box-shadow: 0 10px 22px rgba(37, 99, 235, 0.28);
        }

        .nav-link {
            color: #344054;
            font-weight: 600;
            border-radius: 999px;
            padding: 8px 14px !important;
        }

        .nav-link:hover {
            color: var(--brand-dark);
            background: rgba(37, 99, 235, 0.08);
        }

        .page-title {
            font-weight: 800;
            color: var(--ink);
        }

        .page-kicker {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            color: var(--teal);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.78rem;
        }

        .page-kicker::before {
            content: "";
            width: 22px;
            height: 4px;
            border-radius: 999px;
            background: var(--coral);
        }

        .card,
        .alert {
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(31, 41, 55, 0.08);
        }

        .card {
            background: var(--surface);
            overflow: hidden;
        }

        .card-header {
            border-bottom: 1px solid var(--line);
        }

        .form-control,
        .form-select,
        input[type="text"],
        input[type="password"],
        input[type="email"],
        input[type="date"],
        input[type="time"],
        select,
        textarea {
            width: 100%;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: 0.68rem 0.82rem;
            background-color: rgba(255, 255, 255, 0.96);
            color: var(--ink);
        }

        .form-control:focus,
        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 0.2rem rgba(37, 99, 235, 0.14);
            outline: 0;
        }

        .btn {
            border-radius: 8px;
            font-weight: 700;
        }

        .btn-primary {
            border: 0;
            background: linear-gradient(135deg, var(--brand), var(--teal));
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.22);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--brand-dark), #0d9488);
        }

        .btn-success {
            border: 0;
            background: linear-gradient(135deg, #10b981, #0f9f8f);
        }

        .btn-warning {
            border: 0;
            color: #422006;
            background: linear-gradient(135deg, #facc15, var(--amber));
        }

        .table {
            --bs-table-bg: transparent;
        }

        .table thead th {
            color: #475467;
            background: #f0f7ff;
            border-bottom: 1px solid var(--line);
        }

        .table tbody tr:hover {
            background: rgba(37, 99, 235, 0.05);
        }

        .stat-card {
            color: #fff;
            border: 0;
        }

        .stat-card .text-muted {
            color: rgba(255, 255, 255, 0.78) !important;
        }

        .stat-blue { background: linear-gradient(135deg, #2563eb, #38bdf8); }
        .stat-amber { background: linear-gradient(135deg, #f59e0b, #fb7185); }
        .stat-teal { background: linear-gradient(135deg, #0f9f8f, #22c55e); }
        .stat-slate { background: linear-gradient(135deg, #475569, #8b5cf6); }

        .status-pill {
            border-radius: 999px;
            padding: 0.45rem 0.72rem;
            font-weight: 800;
        }

        .qr-frame {
            border-radius: 8px;
            border: 1px solid rgba(15, 159, 143, 0.2);
            background: linear-gradient(180deg, #ffffff, #f0fdfa);
            box-shadow: inset 0 0 0 8px rgba(15, 159, 143, 0.06);
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg border-bottom sticky-top">
    <div class="container">
        <a class="navbar-brand fw-semibold d-flex align-items-center" href="{% url 'visitors:register' %}">
            <span class="brand-mark">V</span>
            <span>Visitor Management</span>
        </a>
        <div class="navbar-nav ms-auto">
            {% if request.user.is_authenticated %}
                <a class="nav-link" href="{% url 'reception:dashboard' %}">Dashboard</a>
                <a class="nav-link" href="{% url 'reception:scan' %}">Scan</a>
                <a class="nav-link" href="{% url 'reception:visit-list' %}">Visitors</a>
                <a class="nav-link" href="{% url 'reception:reports' %}">Reports</a>
                <form method="post" action="{% url 'accounts:logout' %}">
                    {% csrf_token %}
                    <button class="btn btn-link nav-link" type="submit">Logout</button>
                </form>
            {% else %}
                <a class="nav-link" href="{% url 'accounts:login' %}">Reception Login</a>
            {% endif %}
        </div>
    </div>
</nav>
<main class="container py-4 app-shell">
    {% for message in messages %}
        <div class="alert alert-{{ message.tags|default:'info' }}">{{ message }}</div>
    {% endfor %}
    {% block content %}{% endblock %}
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
