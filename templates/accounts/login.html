{% extends "base/base.html" %}
{% block title %}Reception Login{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="text-center mb-4">
            <div class="page-kicker justify-content-center">Secure access</div>
            <h1 class="page-title h2 mb-2">Reception Login</h1>
            <p class="text-muted mb-0">Sign in to scan QR codes and manage visitor movement.</p>
        </div>
        <div class="card">
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    {{ form.non_field_errors }}
                    <div class="mb-3">
                        <label class="form-label" for="{{ form.username.id_for_label }}">Username</label>
                        {{ form.username }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="{{ form.password.id_for_label }}">Password</label>
                        {{ form.password }}
                    </div>
                    <button class="btn btn-primary w-100 py-2" type="submit">Login</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
